name: CI/CD

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  ci:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev make gcc

      - name: Run tests
        run: make test

  cd:
    name: Package release artifact
    runs-on: ubuntu-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev make gcc zip

      - name: Build
        run: make build

      - name: Prepare package
        run: |
          mkdir -p dist
          cp game dist/
          cp README.md dist/
          zip -r pong-release.zip dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pong-release-${{ github.ref_name }}
          path: pong-release.zip
